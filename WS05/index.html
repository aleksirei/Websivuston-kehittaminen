<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Siilien sivut</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="responsive-nav">
    <button class="menu-toggle">☰ Menu</button>
    <ul class="nav-list">
      <li><a href="#about">Koti</a></li>
      <li><a href="#mofmof">Tietoa siileistä</a></li>
      <li><a href="#contact">Yhteystiedot</a></li>
    </ul>
  </nav>

  <header>
    <h1>Möfmöfin ja Neropatin sivut</h1>
  </header>

  <main>

    <div class="responsive-container">
      <div class="column">
        Pötkö
      </div>
      <div class="column">
        Pötkö 2
      </div>
    </div>

    <section id="about">
      <h2>Siilien elämää</h2>
      <p>Siilit tunnetaan tuhinastaan</p>

      <img src="kuvat/mofmof2.jpg" alt="Siilin ilme" class="responsive-image">

    </section>

    <section id="services">
      <h2>Siililaatikot</h2>

      <div class="grid-container">
        <div class="card">Iso siili</div>
        <div class="card">Pieni siili</div>
        <div class="card">Laatikko</div>
      </div>
    </section>

    <section id="mofmof">
      <h2>Möfmöf</h2>
      <p>Möfmöf on iso siili</p>
    </section>

    <section id="neropatti">
      <h2>Neropatti</h2>
      <p>Neropatti on pieni siili</p>

      <div class="flex-container">
        <div class="box">A</div>
        <div class="box">B</div>
        <div class="box">C</div>
      </div>
    </section>

    <section id="contact">
      <h2>Yhteys</h2>

      <div class="media-query-box">
        Kokeile eri kokoa
      </div>

    </section>

  </main>

  <footer>
    <p>Copyright jne</p>
  </footer>

</body>
</html>
