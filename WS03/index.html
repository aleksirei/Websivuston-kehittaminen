<!DOCTYPE html>
    <html lang="fi">
    <head>
        <meta charset="UTF-8">
        <title>Ensimmäinen HTML sivu</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Aleksi Reispakan sivut</h1>
        <div class="animated-banner">Olen tosi siisti tyyppi.</div>
        <img src="siili.jpg" width="300" alt="Siili" class="filter-image">
        <blockquote class="quote">
        Siilien elämää
      </blockquote>
        <button class="transition-button">Harrastukset</button>
<ul class="pseudo-list">
        <li>Lukeminen</li>
        <li>Kirjoittaminen</li>
        <li>Pelaaminen</li>
      </ul>
    <a href="https://www.google.fi">Google</a>
    <div class="animation-box"></div>
    <table>
    <tr>
        <th>Kurssi</th>
        <th>Kurssista saatavat opintopisteet</th>
    </tr>
    <tr>
        <td>Digitaalisen palvelun perusteet</td>
        <td>5</td>
    </tr>
    <tr>
        <td>Websivuston kehittäminen</td>
        <td>5</td>
    </tr>
    <tr>
        <td>Liiketoimintaympäristöt</td>
        <td>5</td>
    </tr>
    </table>
    <form>
    <label for="name">Nimi:</label>
    <input type="text" id="name" name="name"><br><br>
    <label for="email">Sähköposti:</label>
    <input type="email" id="email" name="email"><br><br>
    <input type="submit" value="Submit">
    </form>
    <div class="content-box">
  <h2>Automaattinen</h2>
  <p>Trukki</p>
</div>
    </body>
    </html>
